services:
  postgres:
    image: postgres:16-alpine
    container_name: mazabot-postgres
    restart: unless-stopped
    ports:
      - "5441:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mazabot
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
